<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jong Express Property</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
}

/* Banner */
.banner img {
  width: 100%;
  display: block;
  opacity: 0;
  animation: fadeIn 0.8s ease-in forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
  }
}
/* Section */
.section {
  padding: 40px 20px;
}

/* Buttons */
.btn {
  display: inline-block;
  margin: 10px;
  padding: 12px 20px;
  border-radius: 30px;
  background: #22c55e;
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  background: #16a34a;
}

/* Social icons */
.icon {
  width: 50px;
  margin: 10px;
  transition: 0.3s;
}

.icon:hover {
  transform: scale(1.3);
}

/* Cards */
.card {
  background: #1e293b;
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
  display: inline-block;
  width: 250px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

/* Floating WhatsApp */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
}

.whatsapp img {
  width: 60px;
  transition: 0.3s;
}

.whatsapp img:hover {
  transform: scale(1.2);
}
</style>
</head>

<body>

<!-- Banner -->
<div class="banner">
  <img src="https://raw.githubusercontent.com/JONG-NEW/JongExpressProperty/main/653713034_122101231947019043_183818896767957459_n.png">
</div>

<!-- Title -->
<div class="section">
  <h1>Jong Express Property</h1>
  <p>Helping you buy, sell & rent properties in Malaysia</p>
</div>

<!-- Contact -->
<div class="section">
  <h2>Contact Me</h2>

  <a href="https://wa.me/60169242000">
    <img class="icon" src="https://img.icons8.com/color/48/000000/whatsapp.png">
  </a>

  <a href="https://instagram.com/jongks1234">
    <img class="icon" src="https://img.icons8.com/color/48/000000/instagram-new.png">
  </a>

  <a href="https://www.facebook.com/jongexpresssproperty">
    <img class="icon" src="https://img.icons8.com/color/48/000000/facebook-new.png">
  </a>

</div>

<!-- Services -->
<div class="section">
  <h2>My Services</h2>

  <div class="card">House for Sale</div>
  <div class="card">House for Rent</div>
  <div class="card">Property Consultation</div>
  <div class="card">Investment Advice</div>

</div>

<!-- Listings -->
<div class="section">
  <h2>Featured Listings</h2>

  <div class="card">
    🏠 House for Sale <br> Contact for price
  </div>

  <div class="card">
    🏢 Condo for Rent <br> Contact for details
  </div>
</div>

<!-- Button -->
<div class="section">
  <a class="btn" href="https://wa.me/60169242000">Chat on WhatsApp</a>
</div>

<!-- Floating WhatsApp -->
<a class="whatsapp" href="https://wa.me/60169242000">
  <img src="https://img.icons8.com/color/48/000000/whatsapp.png">
</a>

</body>
</html>
